<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Đồng Hồ</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial;
      }

      body {
        background: #f2f2f2;
      }

      /* MENU */
      .menu {
        width: 100%;
        background: #c9b08a;
        display: flex;
        justify-content: center;
        gap: 40px;
        padding: 12px 0;
      }

      .menu a {
        text-decoration: none;
        color: white;
        font-size: 13px;
        font-weight: bold;
      }

      /* TIÊU ĐỀ */
      .title {
        margin: 15px;
        font-size: 18px;
        font-weight: bold;
      }

      /* DANH SÁCH SẢN PHẨM */
      .product-list {
        display: flex;
        justify-content: center;
        gap: 20px;
        padding: 10px;
        flex-wrap: wrap;
      }

      /* CARD */
      .card {
        width: 220px;
        background: white;
        border: 1px solid #ddd;
        text-align: center;
        position: relative;
        padding-bottom: 15px;
      }

      /* SALE */
      .sale {
        position: absolute;
        top: 10px;
        left: 10px;
        background: red;
        color: white;
        width: 40px;
        height: 40px;
        border-radius: 50%;
        line-height: 40px;
        font-size: 14px;
        font-weight: bold;
      }

      /* ẢNH */
      .card img {
        width: 140px;
        height: 180px;
        object-fit: contain;
        margin-top: 40px;
      }

      /* TÊN */
      .name {
        font-weight: bold;
        margin-top: 10px;
      }

      /* GIÁ */
      .old-price {
        color: red;
        text-decoration: line-through;
        font-size: 14px;
        margin-top: 5px;
      }

      .new-price {
        color: red;
        font-weight: bold;
        font-size: 18px;
        margin-top: 5px;
      }

      /* BUTTON */
      .btn {
        display: inline-block;
        margin-top: 10px;
        background: red;
        color: white;
        padding: 8px 15px;
        text-decoration: none;
        font-size: 13px;
        font-weight: bold;
      }

      .btn:hover {
        background: darkred;
      }
    </style>
  </head>

    <div class="menu">
